name: CI
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    name: Build and Test Daml Contracts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install DPM
        run: curl https://get.digitalasset.com/install/install.sh | sh
        shell: bash

      - name: Add DPM to PATH
        run: echo "$HOME/.dpm/bin" >> $GITHUB_PATH
        shell: bash

      - name: Cache DPM packages
        uses: actions/cache@v4
        with:
          path: ~/.dpm/packages
          key: ${{ runner.os }}-dpm-packages-${{ hashFiles('**/daml.yaml') }}
          restore-keys: |
            ${{ runner.os }}-dpm-packages-

      - name: Build Daml contracts
        run: dpm build

      - name: Run Daml tests
        run: dpm test